<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULE — ავტორიზაცია</title>
    <link rel="stylesheet" href="assets/fonts/fonts.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header__inner container">
            <a href="index.html" class="header__logo">
                <img src="assets/images/logo.png" alt="BULE ლოგო" width="158" height="86">
            </a>

            <nav class="header__nav" id="main-nav" aria-label="მთავარი ნავიგაცია">
                <ul class="header__nav-list">
                    <li class="header__nav-item">
                        <a href="index.html" class="header__nav-link">მთავარი</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="menu.html" class="header__nav-link">მენიუ</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="contact.html" class="header__nav-link">კონტაქტი</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="about.html" class="header__nav-link">ჩვენს შესახებ</a>
                    </li>
                </ul>
            </nav>

            <div class="header__actions">
                <button
                    type="button"
                    class="header__burger"
                    aria-label="მენიუ"
                    aria-expanded="false"
                    aria-controls="main-nav"
                    data-nav-toggle
                >
                    <span class="header__burger-line" aria-hidden="true"></span>
                    <span class="header__burger-line" aria-hidden="true"></span>
                    <span class="header__burger-line" aria-hidden="true"></span>
                </button>
                <button type="button" class="header__action" aria-label="კალათა" data-cart-open>
                    <img src="assets/icons/cart.svg" alt="" width="36" height="36">
                </button>
                <a href="sign-in.html" class="header__action" aria-label="პროფილი">
                    <img src="assets/icons/profile.svg" alt="" width="36" height="36">
                </a>
            </div>
        </div>
    </header>

    <main class="main auth-page">
        <section class="auth" aria-labelledby="auth-title">
            <div class="auth__card">
                <header class="auth__header">
                    <h1 id="auth-title" class="auth__title">ავტორიზაცია</h1>
                    <p class="auth__subtitle">სისტემაში შესვლა</p>
                </header>

                <form class="auth__form" action="#" method="post">
                    <div class="form-field form-field--filled">
                        <label for="sign-in-email" class="form-field__label">ელექტრონული ფოსტა</label>
                        <input
                            type="email"
                            id="sign-in-email"
                            name="email"
                            class="form-field__input"
                            value="jonas_kahnwald@gmail.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-field">
                        <label for="sign-in-password" class="form-field__label">პაროლი</label>
                        <div class="form-field__control">
                            <input
                                type="password"
                                id="sign-in-password"
                                name="password"
                                class="form-field__input"
                                placeholder="პაროლი"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="form-field__toggle" aria-label="პაროლის ჩვენება">
                                <img src="assets/icons/eye-off.svg" alt="" width="24" height="24">
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn--primary auth__submit">შესვლა</button>

                    <div class="auth__divider" role="separator" aria-label="ან">
                        <span class="auth__divider-line"></span>
                        <span class="auth__divider-text">ან</span>
                        <span class="auth__divider-line"></span>
                    </div>

                    <button type="button" class="btn btn--google auth__google">
                        <span>გუგლით შესვლა</span>
                        <img src="assets/icons/google.svg" alt="" width="24" height="24">
                    </button>
                </form>

                <p class="auth__switch">
                    არ გაქვთ ანგარიში?
                    <a href="sign-up.html" class="auth__switch-link">დარეგისტრირდი</a>
                </p>
            </div>
        </section>
    </main>

    <!-- Cart drawer -->
    <div class="cart-overlay" id="cart-overlay" hidden>
        <div class="cart-overlay__backdrop" data-cart-close tabindex="-1" aria-hidden="true"></div>

        <aside
            class="cart-drawer"
            id="cart-drawer"
            role="dialog"
            aria-modal="true"
            aria-labelledby="cart-title"
            aria-hidden="true"
        >
            <header class="cart-drawer__header">
                <div class="cart-drawer__heading">
                    <h2 id="cart-title" class="cart-drawer__title">თქვენი შეკვეთა</h2>
                </div>
                <button type="button" class="cart-drawer__close" data-cart-close aria-label="კალათის დახურვა">
                    <span aria-hidden="true">&times;</span>
                </button>
            </header>

            <ul class="cart-drawer__items">
                <li class="cart-drawer__item">
                    <article class="cart-item">
                        <img
                            class="cart-item__image"
                            src="assets/images/cinnamon-roll.png"
                            alt=""
                            width="80"
                            height="80"
                        >
                        <div class="cart-item__body">
                            <h3 class="cart-item__name">დარიჩინის ფუნთუშა</h3>
                            <div class="cart-item__footer">
                                <div class="quantity" aria-label="რაოდენობა">
                                    <button type="button" class="quantity__btn" aria-label="შემცირება">
                                        <img src="assets/icons/minus.svg" alt="" width="38" height="38">
                                    </button>
                                    <span class="quantity__value">2</span>
                                    <button type="button" class="quantity__btn" aria-label="გაზრდა">
                                        <img src="assets/icons/plus.svg" alt="" width="38" height="38">
                                    </button>
                                </div>
                                <p class="cart-item__price">20₾</p>
                            </div>
                        </div>
                    </article>
                </li>

                <li class="cart-drawer__item">
                    <article class="cart-item">
                        <img
                            class="cart-item__image"
                            src="assets/images/cinnamon-roll.png"
                            alt=""
                            width="80"
                            height="80"
                        >
                        <div class="cart-item__body">
                            <h3 class="cart-item__name">დარიჩინის ფუნთუშა</h3>
                            <div class="cart-item__footer">
                                <div class="quantity" aria-label="რაოდენობა">
                                    <button type="button" class="quantity__btn" aria-label="შემცირება">
                                        <img src="assets/icons/minus.svg" alt="" width="38" height="38">
                                    </button>
                                    <span class="quantity__value">1</span>
                                    <button type="button" class="quantity__btn" aria-label="გაზრდა">
                                        <img src="assets/icons/plus.svg" alt="" width="38" height="38">
                                    </button>
                                </div>
                                <p class="cart-item__price">10₾</p>
                            </div>
                        </div>
                    </article>
                </li>
            </ul>

            <footer class="cart-drawer__footer">
                <dl class="cart-total">
                    <div class="cart-total__row">
                        <dt class="cart-total__label">სულ</dt>
                        <dd class="cart-total__value">30₾</dd>
                    </div>
                    <div class="cart-total__row">
                        <dt class="cart-total__label">მიტანა</dt>
                        <dd class="cart-total__value">5₾</dd>
                    </div>
                    <div class="cart-total__row cart-total__row--total">
                        <dt class="cart-total__label">ჯამი</dt>
                        <dd class="cart-total__value">35₾</dd>
                    </div>
                </dl>

                <a href="payment.html" class="btn btn--primary cart-drawer__checkout">
                    <img src="assets/icons/cart-btn.svg" alt="" width="22" height="21">
                    <span>განაგრძე</span>
                </a>
            </footer>
        </aside>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
