<!-- Cart drawer overlay — include before closing </body> on every page -->
<div class="cart-overlay" id="cart-overlay" hidden>
    <div class="cart-overlay__backdrop" data-cart-close tabindex="-1" aria-hidden="true"></div>

    <aside
        class="cart-drawer"
        id="cart-drawer"
        role="dialog"
        aria-modal="true"
        aria-labelledby="cart-title"
        aria-hidden="true"
    >
        <header class="cart-drawer__header">
            <div class="cart-drawer__heading">
                <h2 id="cart-title" class="cart-drawer__title">თქვენი შეკვეთა</h2>
            </div>
            <button type="button" class="cart-drawer__close" data-cart-close aria-label="კალათის დახურვა">
                <span aria-hidden="true">&times;</span>
            </button>
        </header>

        <ul class="cart-drawer__items">
            <li class="cart-drawer__item">
                <article class="cart-item">
                    <img
                        class="cart-item__image"
                        src="assets/images/cinnamon-roll.png"
                        alt=""
                        width="80"
                        height="80"
                    >
                    <div class="cart-item__body">
                        <h3 class="cart-item__name">დარიჩინის ფუნთუშა</h3>
                        <div class="cart-item__footer">
                            <div class="quantity" aria-label="რაოდენობა">
                                <button type="button" class="quantity__btn" aria-label="შემცირება">
                                    <img src="assets/icons/minus.svg" alt="" width="38" height="38">
                                </button>
                                <span class="quantity__value">2</span>
                                <button type="button" class="quantity__btn" aria-label="გაზრდა">
                                    <img src="assets/icons/plus.svg" alt="" width="38" height="38">
                                </button>
                            </div>
                            <p class="cart-item__price">20₾</p>
                        </div>
                    </div>
                </article>
            </li>

            <li class="cart-drawer__item">
                <article class="cart-item">
                    <img
                        class="cart-item__image"
                        src="assets/images/cinnamon-roll.png"
                        alt=""
                        width="80"
                        height="80"
                    >
                    <div class="cart-item__body">
                        <h3 class="cart-item__name">დარიჩინის ფუნთუშა</h3>
                        <div class="cart-item__footer">
                            <div class="quantity" aria-label="რაოდენობა">
                                <button type="button" class="quantity__btn" aria-label="შემცირება">
                                    <img src="assets/icons/minus.svg" alt="" width="38" height="38">
                                </button>
                                <span class="quantity__value">1</span>
                                <button type="button" class="quantity__btn" aria-label="გაზრდა">
                                    <img src="assets/icons/plus.svg" alt="" width="38" height="38">
                                </button>
                            </div>
                            <p class="cart-item__price">10₾</p>
                        </div>
                    </div>
                </article>
            </li>
        </ul>

        <footer class="cart-drawer__footer">
            <dl class="cart-total">
                <div class="cart-total__row">
                    <dt class="cart-total__label">სულ</dt>
                    <dd class="cart-total__value">30₾</dd>
                </div>
                <div class="cart-total__row">
                    <dt class="cart-total__label">მიტანა</dt>
                    <dd class="cart-total__value">5₾</dd>
                </div>
                <div class="cart-total__row cart-total__row--total">
                    <dt class="cart-total__label">ჯამი</dt>
                    <dd class="cart-total__value">35₾</dd>
                </div>
            </dl>

            <a href="payment.html" class="btn btn--primary cart-drawer__checkout">
                <img src="assets/icons/cart-btn.svg" alt="" width="22" height="21">
                <span>განაგრძე</span>
            </a>
        </footer>
    </aside>
</div>

<script src="js/cart.js"></script>
